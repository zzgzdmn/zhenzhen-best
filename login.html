<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>中国戏曲文化宣传与学习平台 - 登录</title>
    <!-- 引入核心全局样式表 -->
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        /* ==========================================
           【珍珍仙女专属设计】: 叠图悬浮纯白不透明盒子登录系统（小人挨到才转 + 标题一键居中）
           ========================================== */
        
        /* 全屏水晶清晰背景：图1，保证全站一致性 */
        .login-page-bg {
            width: 100vw;
            height: 100vh;
            background-image: url('images/pic1.jpg'); /* 图片1: 通用清晰山水图 */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 1200px 黄金版心：主图大卡片 */
        .login-main-card {
            position: relative;
            width: 950px;
            height: 580px;
            /* 核心安全保障：如果您的图片 pic266.png 此时没有放进去，会自动展示经典中国红实体背景，绝不白屏！ */
            background-color: #8c1c1c !important; 
            background-image: url('images/pic266.png'); /* 卡片完全铺满图片2 */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            border-radius: 12px;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.15);
            z-index: 10;
        }

        /* 悬浮在图片上方左侧的、独立的、竖着的纯白不透明实体表单盒 (彻底防溢出) */
        .login-form-panel {
            position: absolute;
            left: 45px;
            top: 35px;
            bottom: 35px; /* 上下预留 35px 呼吸高度 */
            width: 420px; /* 竖着的长方形宽度 */
            background: #ffffff !important; /* 完全纯白色、100%不透明 */
            border-radius: 12px;
            padding: 35px 30px 25px; /* 压缩内边距，完全杜绝底部溢出 */
            display: flex;
            flex-direction: column;
            justify-content: center; /* 垂直完美居中 */
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2); /* 实体盒子阴影 */
            z-index: 20; /* 悬浮于图片上方 */
        }

        /* 顶部标题组 */
        .login-right-header {
            text-align: center;
            margin-bottom: 12px; /* 压缩间距，释放高度 */
            margin-top: 5px; /* 标题下移，回归黄金高度 */
        }

        /* 大标题：字号 24px、绝对居中、且设为大气的中国红（#8c1c1c） */
        .login-right-header h4 {
            font-size: 24px !important; 
            color: #8c1c1c !important;  
            font-weight: bold !important;
            letter-spacing: 1.5px;
            line-height: 1.4;
            text-align: center;
        }

        /* ==========================================
           旋转小人容器与 360° 自转动画（鼠标挨到才转）
           ========================================== */
        .login-mascot-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0px auto 12px; /* 挤出完美的上下对称空间 */
        }

        /* 戏剧Q版小人：默认状态下完全静止不动，高度缩至 60px 极大地释放了空间，让标题下移 */
        .spinning-mascot {
            height: 60px; /* 缩至60px，自适应比例 */
            width: auto;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.12)); /* 柔和投影 */
            cursor: pointer;
            transition: transform 0.4s ease; /* 平滑位移 */
            transform: rotate(0deg);
        }

        /* 只有鼠标指上去（挨到他）时，才会触发 2秒/圈 的匀速自转效果，不挨到时绝对不转 */
        .spinning-mascot:hover {
            animation: mascotRotate 2s linear infinite; /* 挨到时自转 */
        }

        /* 360度旋转动画帧 */
        @keyframes mascotRotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        /* 表单体隐藏/显现动画 */
        .login-form-body {
            position: absolute;
            width: calc(100% - 60px);
            opacity: 0;
            visibility: hidden;
            transform: translateY(10px);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* 激活状态下的表单显现 */
        .login-form-body.active {
            position: relative;
            width: 100%;
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        /* 表单内部提示语：更正为清晰的纯黑色（#111111） */
        .login-form-body h2 {
            font-size: 20px; /* 缩减至20px */
            color: #111111 !important; /* 纯黑色 */
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px; /* 压缩间隙 */
            letter-spacing: 2px;
        }

        /* 表单输入组 */
        .login-input-group {
            margin-bottom: 12px; /* 极致省空间 */
            display: flex;
            flex-direction: column;
        }

        /* 输入框细节：打出来的字为 16px大字体、纯黑色（#111111）且加粗，极其易读清晰 */
        .login-input-group input {
            width: 100%;
            padding: 11px 15px; /* 缩紧高度 */
            border: 1px solid rgba(0, 0, 0, 0.15);
            border-radius: 6px;
            font-size: 15px !important; /* 加大字体 */
            font-weight: bold !important; /* 字体加粗 */
            color: #111111 !important;   /* 输入进去的文字为纯黑色 */
            font-family: inherit;
            background: #f7f7f7; /* 输入框背景设为微灰 */
            transition: all 0.3s;
        }

        /* 统一输入框占位符颜色为深灰色 */
        .login-input-group input::placeholder {
            color: #555555;
            font-weight: normal;
        }

        .login-input-group input:focus {
            border-color: #8c1c1c; /* 聚焦变为戏曲红边 */
            background: #ffffff;
            outline: none;
            box-shadow: 0 0 10px rgba(140, 28, 28, 0.2);
        }

        /* 记住密码与忘记密码链接：设为纯黑色 */
        .login-btn-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            margin-bottom: 15px;
        }

        .login-btn-group a {
            color: #111111 !important; /* 设为纯黑色 */
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }

        .login-btn-group a:hover {
            color: #8c1c1c !important; /* 悬浮变红色 */
        }

        /* 国潮戏曲“金光祥云”按钮动效 */
        .login-submit-btn {
            width: 100%;
            background-color: #8c1c1c; /* 戏曲经典红 */
            color: #ffffff !important;
            border: 1px solid #8c1c1c;
            padding: 11px; /* 缩紧padding */
            font-size: 15px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
            letter-spacing: 4px;
            margin-bottom: 10px; /* 缩紧 */
            box-shadow: 0 4px 15px rgba(140, 28, 28, 0.3);
        }

        /* 鼠标悬停：按钮上浮，动感拉满 */
        .login-submit-btn:hover {
            background-color: #b52424;
            transform: translateY(-2px) scale(1.01);
            border-color: #ffdf7a; /* 金边 */
            box-shadow: 0 0 20px #ffdf7a, 0 4px 15px rgba(140, 28, 28, 0.5); /* 金光祥云光晕 */
        }

        /* 游客访问：红边空心按钮 */
        .guest-link-btn {
            display: block;
            width: 100%;
            border: 1.5px solid #8c1c1c; /* 红边 */
            color: #8c1c1c !important; /* 红色字体 */
            background: none;
            padding: 9px; /* 缩紧 */
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 2px;
        }

        .guest-link-btn:hover {
            border-color: #b52424;
            color: #ffffff !important;
            background-color: #8c1c1c;
            box-shadow: 0 4px 12px rgba(140, 28, 28, 0.2);
        }

        /* 下方切换引导文字：辅助文字设为纯黑色，核心跳转链接设为红色 */
        .switch-form-text {
            text-align: center;
            font-size: 13px; /* 调小防止底部拥挤 */
            color: #111111 !important; /* 辅助字更正为高清晰的纯黑色 */
            margin-top: 10px; /* 缩窄 */
            font-weight: bold;
        }

        .switch-form-text a {
            color: #8c1c1c !important; /* 强制跳转链接（如立即注册）设为醒目的红色 */
            text-decoration: none;
            font-weight: bold;
            margin-left: 5px;
            transition: all 0.3s;
        }

        .switch-form-text a:hover {
            color: #b52424 !important;
            text-decoration: underline;
        }

        /* 红色行内纠错消息提示 */
        .error-msg-box {
            color: #ff3333;
            font-size: 13px;
            font-weight: bold !important;
            margin-bottom: 8px; /* 压缩 */
            text-align: left;
            display: none; /* 默认隐藏 */
        }
    </style>
</head>
<body>

    <!-- 铺满全屏山水（图1，100%超高清一致） -->
    <div class="login-page-bg">

        <!-- 黄金比例大卡片 -->
        <div class="login-main-card">
            
            <!-- 悬浮在图片上方左侧的、独立的、纯白不透明实体表单盒 (彻底防溢出) -->
            <div class="login-form-panel">
                
                <!-- 顶部平台说明 (大标题红色放大居中) -->
                <div class="login-right-header">
                    <h4>中国戏曲文化宣传与学习平台</h4>
                </div>

                <!-- 核心新增：旋转小人容器与 360° 自转动画（默认静止不动，鼠标挨到才转） -->
                <div class="login-mascot-container">
                    <img src="images/pic14.png" alt="旋转戏剧人物" class="spinning-mascot">
                </div>

                <!-- 【A. 登录窗口】 -->
                <div class="login-form-body active" id="loginFormBlock">
                    <h2>欢迎回来</h2>
                    
                    <!-- 纠错提示框 -->
                    <div class="error-msg-box" id="loginErrorMsg">用户名或密码错误！</div>
                    
                    <form onsubmit="handleLogin(event)">
                        <div class="login-input-group">
                            <input type="text" id="loginUser" placeholder="请输入用户名" required>
                        </div>
                        <div class="login-input-group">
                            <input type="password" id="loginPass" placeholder="请输入密码" required>
                        </div>
                        
                        <div class="login-btn-group">
                            <a href="#" onclick="toggleForm('reset')">忘记密码？</a>
                        </div>
                        
                        <button type="submit" class="login-submit-btn">登录</button>
                        <a href="index.html" class="guest-link-btn">游客访问</a>
                    </form>
                    
                    <div class="switch-form-text">
                        还没有账号？<a href="#" onclick="toggleForm('register')">立即注册</a>
                    </div>
                </div>

                <!-- 【B. 注册窗口】 -->
                <div class="login-form-body" id="registerFormBlock">
                    <h2>创建账号</h2>
                    
                    <div class="error-msg-box" id="registerErrorMsg">密码输入不一致！</div>
                    
                    <form onsubmit="handleRegister(event)">
                        <div class="login-input-group">
                            <input type="text" id="regUser" placeholder="请输入用户名" required>
                        </div>
                        <div class="login-input-group">
                            <input type="password" id="regPass" placeholder="请输入密码" required>
                        </div>
                        <div class="login-input-group">
                            <input type="password" id="regConfirmPass" placeholder="请确认密码" required>
                        </div>
                        <div class="login-input-group">
                            <input type="email" placeholder="请输入邮箱（选填）">
                        </div>
                        
                        <button type="submit" class="login-submit-btn">注册</button>
                    </form>
                    
                    <div class="switch-form-text">
                        已有账号？<a href="#" onclick="toggleForm('login')">立即登录</a>
                    </div>
                </div>

                <!-- 【C. 忘记/重置密码窗口】 -->
                <div class="login-form-body" id="resetFormBlock">
                    <h2>重置密码</h2>
                    
                    <div class="error-msg-box" id="resetErrorMsg" style="color: #00ff00;">密码重置成功，请重新登录！</div>
                    <div class="error-msg-box" id="resetFailMsg">该账号尚未注册！</div>
                    
                    <form onsubmit="handleReset(event)">
                        <div class="login-input-group">
                            <input type="text" id="resetUser" placeholder="请输入需要重置的用户名" required>
                        </div>
                        <div class="login-input-group">
                            <input type="email" placeholder="请输入您绑定的密保邮箱" required>
                        </div>
                        <div class="login-input-group">
                            <input type="password" id="resetPass" placeholder="请输入全新密码" required>
                        </div>
                        
                        <button type="submit" class="login-submit-btn">确认重置</button>
                    </form>
                    
                    <div class="switch-form-text">
                        突然想起来了？<a href="#" onclick="toggleForm('login')">立即登录</a>
                    </div>
                </div>

            </div>

        </div>
    </div>

    <!-- 真实 Mock 数据库与跳转交互控制 JS -->
    <script>
        // 初始化设置默认超级管理员数据库：用户名 zhenzhen，密码 123456
        if (!localStorage.getItem("user_zhenzhen")) {
            localStorage.setItem("user_zhenzhen", "123456");
        }

        // 1. 三卡片平滑淡入滑出切换
        function toggleForm(type) {
            const loginBlock = document.getElementById("loginFormBlock");
            const registerBlock = document.getElementById("registerFormBlock");
            const resetBlock = document.getElementById("resetFormBlock");

            // 隐藏所有行内错误提示
            document.getElementById("loginErrorMsg").style.display = "none";
            document.getElementById("registerErrorMsg").style.display = "none";
            document.getElementById("resetErrorMsg").style.display = "none";
            document.getElementById("resetFailMsg").style.display = "none";

            loginBlock.classList.remove("active");
            registerBlock.classList.remove("active");
            resetBlock.classList.remove("active");

            setTimeout(() => {
                if (type === "register") {
                    registerBlock.classList.add("active");
                } else if (type === "login") {
                    loginBlock.classList.add("active");
                } else if (type === "reset") {
                    resetBlock.classList.add("active");
                }
            }, 100);
        }

        // 2. 真实登录校验逻辑
        function handleLogin(event) {
            event.preventDefault(); 
            const user = document.getElementById("loginUser").value.trim();
            const pass = document.getElementById("loginPass").value;
            const errorBox = document.getElementById("loginErrorMsg");

            // 从本地数据库寻找匹配
            const savedPassword = localStorage.getItem("user_" + user);

            if (savedPassword && savedPassword === pass) {
                errorBox.style.display = "none";
                window.location.href = "index.html"; // 直接跳转首页，无弹窗打扰
            } else {
                errorBox.style.display = "block"; // 输入错误亮红字
            }
        }

        // 3. 真实注册逻辑
        function handleRegister(event) {
            event.preventDefault();
            const user = document.getElementById("regUser").value.trim();
            const pass = document.getElementById("regPass").value;
            const confirmPass = document.getElementById("regConfirmPass").value;
            const errorBox = document.getElementById("registerErrorMsg");

            if (pass !== confirmPass) {
                errorBox.textContent = "两次输入的密码不一致！";
                errorBox.style.display = "block";
                return;
            }

            if (localStorage.getItem("user_" + user)) {
                errorBox.textContent = "该用户名已被注册！";
                errorBox.style.display = "block";
                return;
            }

            localStorage.setItem("user_" + user, pass);
            errorBox.style.display = "none";
            window.location.href = "index.html";
        }

        // 4. 重置密码逻辑
        function handleReset(event) {
            event.preventDefault();
            const user = document.getElementById("resetUser").value.trim();
            const newPass = document.getElementById("resetPass").value;
            const successBox = document.getElementById("resetErrorMsg");
            const failBox = document.getElementById("resetFailMsg");

            if (!localStorage.getItem("user_" + user)) {
                successBox.style.display = "none";
                failBox.style.display = "block";
                return;
            }

            localStorage.setItem("user_" + user, newPass);
            failBox.style.display = "none";
            successBox.style.display = "block";

            setTimeout(() => {
                toggleForm('login');
            }, 1500); // 1.5秒后自动切换到登录
        }
    </script>
</body>
</html>
